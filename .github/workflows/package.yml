name: package

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

env:
  GO_VERSION: "1.26.4"
  GOTOOLCHAIN: local
  UV_VERSION: "0.11.21"

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Build packages
        run: make snapshot

      - name: Inspect deb package
        run: |
          dpkg-deb -I dist/*.deb
          dpkg-deb -c dist/*.deb

      - name: Upload package artifacts
        uses: actions/upload-artifact@42a3f1844413631a632d532562bb72ae33aa33f4 # v4.6.2
        with:
          name: packages
          path: |
            dist/*.deb
            dist/*.rpm
          if-no-files-found: error
