name: release

on:
  push:
    branches:
      - master

permissions:
  contents: write

# Pinned tool versions (bump in one place).
env:
  GO_VERSION: "1.26.4"
  GOTOOLCHAIN: local
  UV_VERSION: "0.11.21"
  NFPM_VERSION: "v2.46.3"
  SEMANTIC_RELEASE_VERSION: "v2.31.0"
  GHR_VERSION: "v0.18.3"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Determine next version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -f .version-unreleased
          go run "github.com/go-semantic-release/semantic-release/v2/cmd/semantic-release@${SEMANTIC_RELEASE_VERSION}" \
            --dry \
            --version-file \
            --allow-initial-development-versions \
            --allow-no-changes \
            --token "${GITHUB_TOKEN}"
          if [ -s .version-unreleased ]; then
            echo "version=$(cat .version-unreleased)" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build deb and rpm packages
        if: steps.version.outputs.version != ''
        env:
          PKGBOT_VERSION: ${{ steps.version.outputs.version }}
        run: make all-pkg

      - name: Create release
        if: steps.version.outputs.version != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          go run "github.com/go-semantic-release/semantic-release/v2/cmd/semantic-release@${SEMANTIC_RELEASE_VERSION}" \
            --version-file \
            --ghr \
            --allow-initial-development-versions \
            --token "${GITHUB_TOKEN}"
          test "$(cat .version)" = "${{ steps.version.outputs.version }}"

      - name: Upload packages to release
        if: steps.version.outputs.version != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run "github.com/tcnksm/ghr@${GHR_VERSION}" -replace $(cat .ghr) dist
