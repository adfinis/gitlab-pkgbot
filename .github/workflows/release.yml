name: release

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  FPM_VERSION: "1.17.0"
  SETUPTOOLS_VERSION: "82.0.1"
  PACKAGING_VERSION: "26.2"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # Compute the next version from the commit history without creating the
      # release yet, so we can build the packages with the correct version
      # before publishing them as release assets.
      - name: Determine next version
        id: version
        uses: go-semantic-release/action@2e9dc4247a6004f8377781bef4cb9dad273a741f # v1.24.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          allow-initial-development-versions: true
          dry: true

      - name: Set up Python
        if: steps.version.outputs.version != ''
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Set up Ruby (for fpm)
        if: steps.version.outputs.version != ''
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version: '3.2'

      - name: Install build dependencies
        if: steps.version.outputs.version != ''
        run: |
          gem install --no-document fpm --version "${FPM_VERSION}"
          # fpm's python source plugin imports `packaging` and shells out to
          # setuptools, so both must be present in the build environment.
          pip install "setuptools==${SETUPTOOLS_VERSION}" "packaging==${PACKAGING_VERSION}"

      - name: Build deb and rpm packages
        if: steps.version.outputs.version != ''
        env:
          PKGBOT_VERSION: ${{ steps.version.outputs.version }}
        run: make all-pkg

      # Create the actual release: tag, GitHub release and changelog.
      - name: Create release
        if: steps.version.outputs.version != ''
        uses: go-semantic-release/action@2e9dc4247a6004f8377781bef4cb9dad273a741f # v1.24.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          allow-initial-development-versions: true
          changelog-file: CHANGELOG.md

      # Attach the built deb and rpm packages to the release that
      # go-semantic-release just created (tag is v<version>).
      - name: Upload packages to release
        if: steps.version.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${{ steps.version.outputs.version }}" dist/*.deb dist/*.rpm --clobber
